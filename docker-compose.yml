version: '3.8'
services:
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: logistica_db
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra

  almacen-a:
    build: ../almacen-a
    container_name: almacen-a
    ports:
      - "9091:9091"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/logistica_db
      SPRING_CASSANDRA_CONTACT_POINTS: cassandra
    depends_on:
      - mariadb
      - cassandra

  almacen-b:
    build: ../almacen-b
    container_name: almacen-b
    ports:
      - "9092:9092"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/logistica_db
      SPRING_CASSANDRA_CONTACT_POINTS: cassandra
    depends_on:
      - mariadb
      - cassandra

  api-gateway:
    build: ../api-gateway
    container_name: api-gateway
    ports:
      - "9090:9090"
    depends_on:
      - almacen-a
      - almacen-b

volumes:
  mariadb_data:
  cassandra_data:
