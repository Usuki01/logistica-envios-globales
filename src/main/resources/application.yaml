server:
  port: 9090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: almacen-b
            uri: http://almacen-b:9092
            predicates:
              - Path=/almacen-b/**
            filters:
              - StripPrefix=1
          - id: almacen-a
            uri: http://almacen-a:9091
            predicates:
              - Path=/almacen-a/**
            filters:
              - StripPrefix=1

eureka:
  client:
    enabled: false

logging:
  level:
    org.springframework.cloud.gateway: TRACE